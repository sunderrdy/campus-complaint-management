<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="login-box">

    <h2>Admin Login</h2>

    <input
    type="text"
    id="adminUser"
    placeholder="Admin Username">

    <input
    type="password"
    id="adminPass"
    placeholder="Password">

    <button onclick="adminLogin()">
        Login
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
